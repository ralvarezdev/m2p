<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <style>{{.CSS}}</style>
  <style>
    {{if eq .PageBreakLevel 2}}@media print { .document h2 ~ h2 { break-before: page; } }{{end}}
    {{if eq .PageBreakLevel 3}}@media print { .document h3 ~ h3 { break-before: page; } }{{end}}
    {{if .ShowFooter}}@media print { .doc-footer { position: fixed; bottom: 0; left: 0; right: 0; margin-top: 0; padding-top: var(--spacing-xl); padding-bottom: var(--spacing-xl); background: white; } .page { padding-bottom: 52px; } }{{end}}
  </style>
</head>
<body>
  <div class="page">
    <article class="document">
      {{.Body}}
    </article>
    {{if .ShowFooter}}
    <footer class="doc-footer">
      <span class="doc-footer-brand"><span>0x</span><span class="accent">RA</span>&nbsp;·&nbsp;m2p</span>
      <span class="doc-footer-date">{{.Date}}</span>
    </footer>
    {{end}}
  </div>
</body>
</html>
