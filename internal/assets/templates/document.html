<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --doc-bg:          #ffffff;
      --doc-fg:          #1a1c2e;
      --doc-muted:       #4a5078;
      --doc-faint:       #8e94b5;
      --doc-border:      #c8cad6;
      --doc-ac:          #2e4d8c;
      --doc-ac-2:        #5a4a8c;
      --doc-ac-3:        #136877;
      --doc-bg-code:     #1a1c2e;
      --doc-bg-quote:    rgba(90,74,140,.06);
      --doc-border-quote:#bb9af7;
      --font-sans:       'Inter', system-ui, sans-serif;
      --font-mono:       'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f0f2f8;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      background: var(--doc-bg);
      max-width: 740px;
      margin: 48px auto;
      padding: 56px 64px 72px;
      border-radius: 3px;
      box-shadow: 0 2px 8px rgba(20,24,40,.08), 0 12px 40px rgba(20,24,40,.1);
      min-height: 960px;
    }

    .document h1 {
      font-family: var(--font-sans);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1.1;
      color: var(--doc-fg);
      margin-bottom: 6px;
      padding-bottom: 14px;
      border-bottom: 2px solid #7aa2f7;
      margin-top: 0;
    }

    .document h2 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.25;
      color: var(--doc-fg);
      margin-top: 44px;
      margin-bottom: 10px;
    }
    .document h2::before {
      content: "§";
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--doc-ac-2);
      margin-right: 8px;
      opacity: .7;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .document h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--doc-muted);
      margin-top: 28px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-family: var(--font-mono);
    }

    .document h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--doc-fg);
      margin-top: 20px;
      margin-bottom: 4px;
    }

    .document p {
      font-size: 15px;
      line-height: 1.75;
      color: #2a2d3e;
      margin-bottom: 14px;
      text-wrap: pretty;
    }

    .document ul, .document ol {
      padding-left: 22px;
      margin-bottom: 16px;
    }
    .document li {
      font-size: 15px;
      line-height: 1.7;
      color: #2a2d3e;
      margin-bottom: 5px;
    }
    .document li::marker { color: var(--doc-faint); }

    .document a {
      color: var(--doc-ac);
      text-decoration: underline;
      text-decoration-color: rgba(46,77,140,.3);
      text-underline-offset: 2px;
    }
    .document a:hover { text-decoration-color: var(--doc-ac); }

    .document strong { color: var(--doc-fg); font-weight: 700; }
    .document em     { color: var(--doc-muted); }

    .document code {
      font-family: var(--font-mono);
      font-size: .87em;
      background: #ebebef;
      color: var(--doc-ac-3);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #d8dae4;
    }

    .document pre {
      background: var(--doc-bg-code);
      border-radius: 8px;
      padding: 20px 24px;
      margin: 20px 0 24px;
      overflow-x: auto;
      border: 1px solid #2a2d4a;
      position: relative;
    }
    .document pre::before {
      content: "● ● ●";
      font-size: 8px;
      letter-spacing: 4px;
      color: #3a3f62;
      position: absolute;
      top: 10px;
      right: 16px;
    }
    .document pre code {
      background: none;
      color: #dce6ff;
      font-size: 13px;
      line-height: 1.75;
      padding: 0;
      border-radius: 0;
      border: none;
    }

    .document blockquote {
      border-left: 3px solid var(--doc-border-quote);
      background: var(--doc-bg-quote);
      padding: 14px 20px;
      margin: 20px 0;
      border-radius: 0 6px 6px 0;
    }
    .document blockquote p {
      color: var(--doc-muted);
      font-style: italic;
      margin-bottom: 0;
    }

    .document hr {
      border: none;
      border-top: 1px solid var(--doc-border);
      margin: 36px 0;
    }

    .document table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 14px;
    }
    .document th {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--doc-faint);
      border-bottom: 2px solid var(--doc-border);
      padding: 8px 12px;
      text-align: left;
    }
    .document td {
      padding: 10px 12px;
      border-bottom: 1px solid #e8eaf0;
      color: #2a2d3e;
      font-size: 14px;
      line-height: 1.5;
    }
    .document tr:last-child td { border-bottom: none; }
    .document tr:hover td { background: rgba(46,77,140,.025); }

    .doc-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--doc-border);
    }
    .doc-footer-brand {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #8e94b5;
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
    }
    .doc-footer-brand .accent { color: #7dcfff; }
    .doc-footer-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #8e94b5;
    }

    @media print {
      *, *::before, *::after { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      html, body { background: white; }
      .page {
        margin: 0;
        padding: 0;
        max-width: none;
        box-shadow: none;
        border-radius: 0;
        min-height: auto;
      }
      .document h2, .document h3 { break-after: avoid; }
      .document pre { break-inside: avoid; }
      {{if eq .PageBreakLevel 2}}.document h2 ~ h2 { break-before: page; }{{end}}
      {{if eq .PageBreakLevel 3}}.document h3 ~ h3 { break-before: page; }{{end}}
      .document h1  { font-size: 28px; }
      .document h2  { font-size: 18px; }
      .document h3  { font-size: 13px; }
      .document p, .document li, .document td { font-size: 13px; }
      .document pre code { font-size: 11.5px; }
      .document code { font-size: .85em; }
      {{if .ShowFooter}}
      .doc-footer { position: fixed; bottom: 0; left: 0; right: 0; margin-top: 0; padding-top: 10px; padding-bottom: 10px; background: white; }
      .page { padding-bottom: 52px; }
      {{end}}
    }
  </style>
</head>
<body>
  <div class="page">
    <article class="document">
      {{.Body}}
    </article>
    {{if .ShowFooter}}
    <footer class="doc-footer">
      <span class="doc-footer-brand"><span>0x</span><span class="accent">RA</span>&nbsp;·&nbsp;m2p</span>
      <span class="doc-footer-date">{{.Date}}</span>
    </footer>
    {{end}}
  </div>
</body>
</html>
