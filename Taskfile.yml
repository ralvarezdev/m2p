version: '3'

vars:
  BINARY: dist/m2p
  MODULE: github.com/ralvarezdev/m2p

tasks:
  build:
    desc: Build the m2p binary into dist/
    cmds:
      - go build -o {{.BINARY}}{{exeExt}} ./cmd/m2p

  install:
    desc: Install m2p to $GOPATH/bin
    cmds:
      - go install ./cmd/m2p

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  snapshot:
    desc: Build a local goreleaser snapshot (all platforms)
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:convert:
    desc: "Build and convert a .md file (e.g. task test:convert INPUT=my.md OUTPUT=out.pdf ENGINE=native PAGE_BREAK=h2)"
    deps: [build]
    vars:
      INPUT: '{{.INPUT | default "testdata/sample.md"}}'
      OUTPUT: '{{.OUTPUT | default "dist/sample.pdf"}}'
      ENGINE: '{{.ENGINE | default "auto"}}'
      PAGE_BREAK: '{{.PAGE_BREAK | default "none"}}'
    cmds:
      - "{{.BINARY}}{{exeExt}} convert {{.INPUT}} -o {{.OUTPUT}} --engine {{.ENGINE}} --page-break {{.PAGE_BREAK}}"

  test:convert:dir:
    desc: "Build and batch-convert all .md files in a folder (e.g. task test:convert:dir INPUT=./docs ENGINE=native PAGE_BREAK=h2)"
    deps: [build]
    vars:
      INPUT: '{{.INPUT | default "testdata/"}}'
      ENGINE: '{{.ENGINE | default "auto"}}'
      PAGE_BREAK: '{{.PAGE_BREAK | default "none"}}'
    cmds:
      - "{{.BINARY}}{{exeExt}} convert {{.INPUT}} --engine {{.ENGINE}} --page-break {{.PAGE_BREAK}}"

  tag:
    desc: "Tag and push a release — triggers the Release workflow (e.g. task tag VERSION=0.1.0)"
    requires:
      vars: [VERSION]
    vars:
      TAG: v{{.VERSION}}
    cmds:
      - platforms: [windows]
        cmd: pwsh -NoProfile -Command "if ('{{.VERSION}}' -notmatch '^\d+\.\d+\.\d+$') { Write-Error 'Invalid version {{.VERSION}} — expected X.Y.Z'; exit 1 }"
      - platforms: [linux, darwin]
        cmd: echo '{{.VERSION}}' | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "Invalid version {{.VERSION}} — expected X.Y.Z"; exit 1; }
      - git tag {{.TAG}}
      - git push origin {{.TAG}}
