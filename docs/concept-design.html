<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0xRA · md→pdf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --bg:        #04050d;
      --bg-s1:     #080b18;
      --bg-s2:     #0c1020;
      --bg-s3:     #14182a;
      --fg:        #dce6ff;
      --fg-muted:  #8892c8;
      --fg-faint:  #3a3f62;
      --border:        #181d35;
      --border-strong: #232a4d;
      --ac:   #7aa2f7;
      --ac-2: #bb9af7;
      --ac-3: #7dcfff;
      --ok:   #9ece6a;
      --warn: #e0af68;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --ease: cubic-bezier(.4,0,.2,1);

      /* Document (light) */
      --doc-bg:       #ffffff;
      --doc-fg:       #1a1c2e;
      --doc-muted:    #4a5078;
      --doc-faint:    #8e94b5;
      --doc-border:   #c8cad6;
      --doc-ac:       #2e4d8c;
      --doc-ac-2:     #5a4a8c;
      --doc-ac-3:     #136877;
      --doc-bg-code:  #1a1c2e;
      --doc-bg-quote: rgba(90,74,140,.06);
      --doc-border-quote: #bb9af7;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── App shell ─────────────────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: grid;
      grid-template-rows: 48px 1fr 28px;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--bg-s2);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      z-index: 20;
    }

    .brand {
      display: inline-flex;
      align-items: baseline;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .01em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bm-0x  { color: var(--fg-faint); font-weight: 500; }
    .bm-ra  { color: var(--ac-3); }
    .bm-sep { color: var(--fg-faint); margin: 0 8px; }
    .bm-tool { color: var(--fg-muted); font-size: 12px; }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .doc-name {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-s1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      outline: none;
      width: 220px;
      color: var(--fg-muted);
      text-align: center;
      transition: border-color .15s var(--ease), color .15s var(--ease);
    }
    .doc-name:focus {
      border-color: var(--ac);
      color: var(--fg);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .paper-select {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--bg-s1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      color: var(--fg-muted);
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .paper-select:focus { border-color: var(--ac); }

    .btn-export {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: var(--ac);
      color: #060a18;
      border: none;
      border-radius: 5px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background .15s var(--ease), transform .15s var(--ease), box-shadow .15s var(--ease);
      box-shadow: 0 0 0 1px rgba(122,162,247,.3), 0 4px 16px rgba(122,162,247,.2);
    }
    .btn-export:hover {
      background: #a8c4ff;
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(122,162,247,.4), 0 6px 20px rgba(122,162,247,.3);
    }
    .btn-export:active { transform: translateY(0); }

    /* ── Panes ─────────────────────────────────────────── */
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Editor pane ───────────────────────────────────── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .pane-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 32px;
      background: var(--bg-s1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pane-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--fg-faint);
    }
    .pane-label.light { color: #8e94b5; }

    .pane-hint {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--fg-faint);
      letter-spacing: .04em;
    }

    .editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg-s1);
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.85;
      padding: 24px 28px;
      tab-size: 2;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }
    .editor::placeholder { color: var(--fg-faint); }

    /* ── Preview pane ──────────────────────────────────── */
    .preview-pane {
      display: flex;
      flex-direction: column;
      background: #ebebef;
      overflow: hidden;
    }

    .pane-bar.light {
      background: #e0e1e8;
      border-bottom-color: #c8cad6;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px 56px;
      scrollbar-width: thin;
      scrollbar-color: #c8cad6 transparent;
    }

    /* ── Document (screen) ─────────────────────────────── */
    .document {
      background: var(--doc-bg);
      border-radius: 3px;
      box-shadow: 0 2px 8px rgba(20,24,40,.08), 0 12px 40px rgba(20,24,40,.1);
      padding: 56px 64px 72px;
      max-width: 680px;
      margin: 0 auto;
      min-height: 960px; /* approx A4 ratio */
    }

    /* ── Document typography ───────────────────────────── */
    .document h1 {
      font-family: var(--font-sans);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1.1;
      color: var(--doc-fg);
      margin-bottom: 6px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--ac);
      margin-top: 0;
    }

    .document h2 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.25;
      color: var(--doc-fg);
      margin-top: 44px;
      margin-bottom: 10px;
    }
    .document h2::before {
      content: "§";
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--doc-ac-2);
      margin-right: 8px;
      opacity: .7;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .document h3 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--doc-muted);
      margin-top: 28px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-family: var(--font-mono);
    }

    .document h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--doc-fg);
      margin-top: 20px;
      margin-bottom: 4px;
    }

    .document p {
      font-size: 15px;
      line-height: 1.75;
      color: #2a2d3e;
      margin-bottom: 14px;
      max-width: none;
      text-wrap: pretty;
    }

    .document ul, .document ol {
      padding-left: 22px;
      margin-bottom: 16px;
    }

    .document li {
      font-size: 15px;
      line-height: 1.7;
      color: #2a2d3e;
      margin-bottom: 5px;
    }

    .document li::marker {
      color: var(--doc-faint);
    }

    .document a {
      color: var(--doc-ac);
      text-decoration: underline;
      text-decoration-color: rgba(46,77,140,.3);
      text-underline-offset: 2px;
      transition: text-decoration-color .12s;
    }
    .document a:hover { text-decoration-color: var(--doc-ac); }

    .document strong { color: var(--doc-fg); font-weight: 700; }
    .document em     { color: var(--doc-muted); }

    .document code {
      font-family: var(--font-mono);
      font-size: .87em;
      background: #ebebef;
      color: var(--doc-ac-3);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #d8dae4;
    }

    .document pre {
      background: var(--doc-bg-code);
      border-radius: 8px;
      padding: 20px 24px;
      margin: 20px 0 24px;
      overflow-x: auto;
      border: 1px solid #2a2d4a;
      position: relative;
    }
    .document pre::before {
      content: "● ● ●";
      font-size: 8px;
      letter-spacing: 4px;
      color: #3a3f62;
      position: absolute;
      top: 10px;
      right: 16px;
    }
    .document pre code {
      background: none;
      color: #dce6ff;
      font-size: 13px;
      line-height: 1.75;
      padding: 0;
      border-radius: 0;
      border: none;
    }

    .document blockquote {
      border-left: 3px solid var(--doc-border-quote);
      background: var(--doc-bg-quote);
      padding: 14px 20px;
      margin: 20px 0;
      border-radius: 0 6px 6px 0;
    }
    .document blockquote p {
      color: var(--doc-muted);
      font-style: italic;
      margin-bottom: 0;
    }

    .document hr {
      border: none;
      border-top: 1px solid var(--doc-border);
      margin: 36px 0;
    }

    .document table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 14px;
    }
    .document th {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--doc-faint);
      border-bottom: 2px solid var(--doc-border);
      padding: 8px 12px;
      text-align: left;
    }
    .document td {
      padding: 10px 12px;
      border-bottom: 1px solid #e8eaf0;
      color: #2a2d3e;
      font-size: 14px;
      line-height: 1.5;
    }
    .document tr:last-child td { border-bottom: none; }
    .document tr:hover td { background: rgba(46,77,140,.025); }

    /* Document footer (brand mark) */
    .doc-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--doc-border);
    }
    .doc-footer-brand {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--doc-faint);
      display: flex;
      align-items: baseline;
      gap: 2px;
    }
    .doc-footer-brand .bm-ra-sm { color: var(--doc-ac-3); }
    .doc-footer-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--doc-faint);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      padding: 40px;
      color: var(--doc-faint);
      font-family: var(--font-mono);
      font-size: 13px;
      text-align: center;
      min-height: 320px;
    }
    .empty-arrow {
      font-size: 20px;
      animation: nudge 2s ease-in-out infinite;
    }
    @keyframes nudge {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(-6px); }
    }

    /* ── Status bar ────────────────────────────────────── */
    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 28px;
      background: var(--bg-s2);
      border-top: 1px solid var(--border);
    }
    .statusbar-left, .statusbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .status-item {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--fg-faint);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-item .val { color: var(--fg-muted); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ok);
      flex-shrink: 0;
    }

    /* ── Print styles ──────────────────────────────────── */
    @media print {
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html, body {
        height: auto;
        overflow: auto;
        background: white;
      }

      .app {
        display: block;
        height: auto;
      }

      header,
      .editor-pane,
      .pane-bar,
      .statusbar { display: none !important; }

      .panes {
        display: block;
        overflow: visible;
      }

      .preview-pane {
        display: block;
        background: white;
        overflow: visible;
      }

      .preview-scroll {
        overflow: visible;
        padding: 0;
      }

      .document {
        box-shadow: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
        min-height: 0;
        margin: 0;
      }

      .document pre { page-break-inside: avoid; }
      .document h2, .document h3 { page-break-after: avoid; }

      @page {
        margin: 2.5cm 2.8cm 2.8cm;
      }

      /* Scale to pt for print */
      .document h1 { font-size: 26pt; }
      .document h2 { font-size: 17pt; margin-top: 28pt; }
      .document h3 { font-size: 11pt; }
      .document p, .document li, .document td { font-size: 11pt; }
      .document pre code { font-size: 9pt; }
      .document code { font-size: 9.5pt; }

      /* Keep code block dark in print */
      .document pre {
        background: #1a1c2e !important;
        border-color: #2a2d4a !important;
      }
      .document pre code { color: #dce6ff !important; }
      .document pre::before { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header>
      <div class="brand">
        <span class="bm-0x">0x</span><span class="bm-ra">RA</span><span class="bm-sep">·</span><span class="bm-tool">md→pdf</span>
      </div>
      <div class="header-center">
        <input class="doc-name" id="docName" type="text" value="untitled" placeholder="document name" spellcheck="false">
      </div>
      <div class="header-right">
        <select class="paper-select" id="paperSize" onchange="updatePaper()">
          <option value="a4">A4</option>
          <option value="letter">Letter</option>
        </select>
        <button class="btn-export" onclick="exportPDF()">Export PDF →</button>
      </div>
    </header>

    <!-- ── Panes ── -->
    <div class="panes">

      <!-- Editor -->
      <div class="editor-pane">
        <div class="pane-bar">
          <span class="pane-label">markdown</span>
          <span class="pane-hint">⌘S to save · live preview →</span>
        </div>
        <textarea class="editor" id="editor"
          placeholder="# Start writing…&#10;&#10;Paste or type your markdown here."
          spellcheck="false"
          oninput="onEdit()"></textarea>
      </div>

      <!-- Preview -->
      <div class="preview-pane">
        <div class="pane-bar light">
          <span class="pane-label light">preview</span>
          <span class="pane-hint" style="color:#8e94b5;" id="paperLabel">A4 · 210 × 297 mm</span>
        </div>
        <div class="preview-scroll" id="previewScroll">
          <div class="document" id="preview"></div>
        </div>
      </div>

    </div>

    <!-- ── Status bar ── -->
    <div class="statusbar">
      <div class="statusbar-left">
        <div class="status-item">
          <span class="status-dot"></span>
          <span>live</span>
        </div>
        <div class="status-item">words <span class="val" id="wordCount">0</span></div>
        <div class="status-item">chars <span class="val" id="charCount">0</span></div>
      </div>
      <div class="statusbar-right">
        <div class="status-item">JetBrains Mono · Inter</div>
        <div class="status-item">0xRA · ralvarez.dev</div>
      </div>
    </div>

  </div>

  <script>
    /* ── Marked config ─────────────────────────────────── */
    marked.setOptions({ breaks: true, gfm: true });

    /* ── Sample document ───────────────────────────────── */
    const SAMPLE = `# rsk — skill registry for Claude Code

A CLI tool that lets you cache, version, and share reusable AI skills across machines and teams. Ships as a single binary with no runtime dependencies.

---

## Overview

**rsk** is content-addressed: every skill is identified by a \`sha256\` hash of its canonical source. Two identical skills always collide to the same key, regardless of where they were authored.

This makes deduplication free and sync deterministic.

## Architecture

The registry follows a three-layer model: local cache → shared team registry → upstream CDN. Each layer is optional and independently configurable.

### Storage layout

\`\`\`
~/.rsk/
├── registry/
│   └── sha256/      # content-addressed blobs
├── index.json       # name → hash mappings
└── config.toml      # global settings
\`\`\`

### Sync protocol

Skills sync over plain HTTP. The server speaks \`application/json\` and never stores credentials — auth is handled by a per-request HMAC header.

\`\`\`go
func (c *Client) Push(skill *Skill) error {
    body, _ := json.Marshal(skill)
    req, _ := http.NewRequest("POST", c.base+"/skills", bytes.NewReader(body))
    req.Header.Set("X-RSK-Sig", c.sign(body))
    resp, err := c.http.Do(req)
    return err
}
\`\`\`

## Design decisions

| Decision | Chosen | Rejected |
| --- | --- | --- |
| Storage | Content-addressed | Database |
| Auth | HMAC per-request | OAuth / JWT |
| Config | TOML | YAML |
| Distribution | Single binary | npm / pip |

> rsk is in active development. The API is not stable before v1.0.

## Status

- \`cache\` — done
- \`push / pull\` — in progress  
- \`worktree support\` — planned
- \`team namespaces\` — planned
`;

    /* ── DOM refs ──────────────────────────────────────── */
    const editor    = document.getElementById('editor');
    const preview   = document.getElementById('preview');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const paperLabel = document.getElementById('paperLabel');
    const docName   = document.getElementById('docName');

    /* ── Render ────────────────────────────────────────── */
    function render(md) {
      if (!md.trim()) {
        preview.innerHTML = `
          <div class="empty-state">
            <span class="empty-arrow">←</span>
            <span>start writing in the editor</span>
          </div>`;
        return;
      }
      const html = marked.parse(md);
      const footer = `
        <div class="doc-footer">
          <div class="doc-footer-brand">
            <span style="color:#8e94b5;font-weight:500;">0x</span><span class="bm-ra-sm">RA</span>
            <span style="color:#c8cad6;margin:0 6px;">·</span>
            <span>ralvarez.dev</span>
          </div>
          <div class="doc-footer-date">${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>`;
      preview.innerHTML = html + footer;
    }

    function updateStats(md) {
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      const chars = md.length;
      wordCount.textContent = words.toLocaleString();
      charCount.textContent = chars.toLocaleString();
    }

    /* ── Paper size ────────────────────────────────────── */
    function updatePaper() {
      const val = document.getElementById('paperSize').value;
      if (val === 'a4') {
        paperLabel.textContent = 'A4 · 210 × 297 mm';
        document.documentElement.style.setProperty('--page-size', 'A4');
      } else {
        paperLabel.textContent = 'Letter · 8.5 × 11 in';
        document.documentElement.style.setProperty('--page-size', 'Letter');
      }
      // Inject @page rule dynamically
      let ps = document.getElementById('__page-style');
      if (!ps) { ps = document.createElement('style'); ps.id = '__page-style'; document.head.appendChild(ps); }
      ps.textContent = `@media print { @page { size: ${val === 'a4' ? 'A4' : 'letter'}; margin: 2.5cm 2.8cm 2.8cm; } }`;
    }

    /* ── Export ────────────────────────────────────────── */
    function exportPDF() {
      const name = docName.value.trim() || 'document';
      document.title = name;
      window.print();
      // Restore title after print dialog closes
      setTimeout(() => { document.title = '0xRA · md→pdf'; }, 1000);
    }

    /* ── Input handler ─────────────────────────────────── */
    function onEdit() {
      const md = editor.value;
      render(md);
      updateStats(md);
      try { localStorage.setItem('ralvarez-mdpdf-content', md); } catch(e) {}
    }

    /* ── Keyboard shortcuts ────────────────────────────── */
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
        e.preventDefault();
        exportPDF();
      }
    });

    /* ── Init ──────────────────────────────────────────── */
    (function init() {
      let saved;
      try { saved = localStorage.getItem('ralvarez-mdpdf-content'); } catch(e) {}
      const md = saved !== null && saved !== undefined ? saved : SAMPLE;
      editor.value = md;
      render(md);
      updateStats(md);
      updatePaper();

      // Persist doc name
      docName.addEventListener('input', () => {
        try { localStorage.setItem('ralvarez-mdpdf-docname', docName.value); } catch(e) {}
      });
      try {
        const savedName = localStorage.getItem('ralvarez-mdpdf-docname');
        if (savedName) docName.value = savedName;
      } catch(e) {}
    })();
  </script>
</body>
</html>
